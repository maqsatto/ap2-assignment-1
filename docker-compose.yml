services:
  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  order-db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    volumes:
      - order-db-data:/var/lib/postgresql/data
      - ./order-service/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

  payment-db:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payment_db
    volumes:
      - payment-db-data:/var/lib/postgresql/data
      - ./payment-service/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"

  payment-service:
    build:
      context: ./payment-service
    env_file:
      - .env
    depends_on:
      payment-db:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "18081:8081"
      - "50051:50051"

  notification-service:
    build:
      context: ./notification-service
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  order-service:
    build:
      context: ./order-service
    env_file:
      - .env
    depends_on:
      order-db:
        condition: service_started
      payment-service:
        condition: service_started
      redis:
        condition: service_healthy
    ports:
      - "18080:8080"
      - "50052:50052"

volumes:
  order-db-data:
  payment-db-data:
  rabbitmq-data:
  redis-data:
