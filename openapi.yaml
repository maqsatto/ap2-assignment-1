openapi: 3.1.0
info:
  title: Order & Payment Microservices API
  version: 1.0.0
  description: |-
    REST APIs for the Clean Architecture-based Order and Payment microservices.
    The Order Service orchestrates payments and exposes idempotent order creation.
    The Payment Service enforces transaction limits, publishes payment.completed events,
    and surfaces the per-order status.
servers:
  - url: http://localhost:18080
    description: Order Service (local)
  - url: http://localhost:18081
    description: Payment Service (local)
paths:
  /orders:
    servers:
      - url: http://localhost:18080
        description: Order Service (local)
    post:
      summary: Create a new order
      operationId: createOrder
      tags:
        - orders
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Pending order created and payment executed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "409":
          description: Duplicate request due to reused idempotency key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Payment service is unavailable; order marked as Failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List all orders
      operationId: listOrders
      tags:
        - orders
      responses:
        "200":
          description: Orders retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
  /orders/{id}:
    servers:
      - url: http://localhost:18080
        description: Order Service (local)
    get:
      summary: Retrieve an existing order
      operationId: getOrder
      tags:
        - orders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /orders/{id}/cancel:
    servers:
      - url: http://localhost:18080
        description: Order Service (local)
    patch:
      summary: Cancel a pending order
      operationId: cancelOrder
      tags:
        - orders
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order successfully cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelResponse"
        "400":
          description: Cancellation rejected (only pending orders allowed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /payments:
    servers:
      - url: http://localhost:18081
        description: Payment Service (local)
    post:
      summary: Process a payment for an order
      operationId: processPayment
      tags:
        - payments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentRequest"
      responses:
        "201":
          description: Payment stored (Authorized or Declined)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      summary: List all payments
      operationId: listPayments
      tags:
        - payments
      responses:
        "200":
          description: Payments retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
  /payments/{order_id}:
    servers:
      - url: http://localhost:18081
        description: Payment Service (local)
    get:
      summary: Check payment status by order ID
      operationId: getPayment
      tags:
        - payments
      parameters:
        - name: order_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment details returned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"
        "404":
          description: Payment not found for provided order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      description: |
        Optional header for POST /orders to enforce idempotency and prevent duplicates.
      required: false
      schema:
        type: string
  schemas:
    CreateOrderRequest:
      type: object
      properties:
        customer_id:
          type: string
        customer_email:
          type: string
          format: email
        item_name:
          type: string
        amount:
          type: integer
          format: int64
      required:
        - customer_id
        - item_name
        - amount
    CreatePaymentRequest:
      type: object
      properties:
        order_id:
          type: string
        amount:
          type: integer
          format: int64
        customer_email:
          type: string
          format: email
      required:
        - order_id
        - amount
        - customer_email
    Order:
      type: object
      properties:
        id:
          type: string
        customer_id:
          type: string
        customer_email:
          type: string
          format: email
        item_name:
          type: string
        amount:
          type: integer
          format: int64
        customer_email:
          type: string
          format: email
        status:
          type: string
          enum:
            - Pending
            - Paid
            - Failed
            - Cancelled
        created_at:
          type: string
          format: date-time
    Payment:
      type: object
      properties:
        id:
          type: string
        order_id:
          type: string
        transaction_id:
          type: string
          nullable: true
        amount:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - Authorized
            - Declined
        created_at:
          type: string
          format: date-time
    CancelResponse:
      type: object
      properties:
        message:
          type: string
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
